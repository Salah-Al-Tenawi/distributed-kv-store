# إعداد نشر Render (Blueprint) — خدمة واحدة تخدم الواجهة + العنقود.
# Render يقرأ هذا الملف تلقائياً عند ربط المستودع.
services:
  - type: web
    name: distributed-kv-store
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
